name = "xanki-web"
main = "src/server/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [ "/api/*", "/auth/*" ]

[[d1_databases]]
binding = "DB"
database_name = "xanki"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "xanki-blobs"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "local-rate-limit"

[triggers]
crons = ["0 3 * * *"]

[[durable_objects.bindings]]
name = "USER_SYNC"
class_name = "UserSyncHub"

[[migrations]]
tag = "v1"
new_classes = ["UserSyncHub"]

[vars]
APP_URL = "http://localhost:8787"
BETTER_AUTH_SECRET = "dev-better-auth-secret-min-32-chars-local"
STRIPE_PRICE_PRO = "price_pro_placeholder"
AI_GATEWAY_ID = "default"
AI_MODEL = "google-ai-studio/gemini-2.5-flash"

# op run（1Password）の process.env から自動ロード。平文 .dev.vars は fallback のみ。
# https://developers.cloudflare.com/workers/configuration/secrets/
[secrets]
required = [
  "GOOGLE_CLIENT_ID",
  "GOOGLE_CLIENT_SECRET",
  "CF_ACCOUNT_ID",
  "AI_GATEWAY_TOKEN",
]
